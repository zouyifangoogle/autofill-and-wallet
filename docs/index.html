<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet Autofill — End-to-End Journey Mock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#e9eaf0; --browser-bg:#f6f7fb; --chrome-bar:#dee1e9; --omnibox:#fff;
    --ink:#1f2330; --ink-soft:#5b6173; --ink-faint:#8a90a2; --line:#e4e6ee;
    --card-surface:#fff; --accent:#1a73e8; --accent-soft:#e8f0fe;
    --good:#188038; --good-soft:#e6f4ea; --warn:#b06000;
    --shadow-lg:0 24px 60px -18px rgba(20,24,45,.32); --shadow-md:0 12px 30px -10px rgba(20,24,45,.22);
    --radius:18px;
    --w-bg:#fff; --w-ink:#1f2330; --w-sub:#5b6173; --w-line:#ececf2; --w-accent:#1a73e8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Manrope',system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 75% -10%,#f0e9ff 0%,transparent 55%),radial-gradient(900px 600px at 5% 110%,#e0f1ff 0%,transparent 50%),var(--bg);
    color:var(--ink);min-height:100%;display:flex;flex-direction:column;align-items:center;padding:30px 18px 22px;-webkit-font-smoothing:antialiased}

  .stage-head{width:100%;max-width:1080px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
  .stage-title{display:flex;align-items:center;gap:11px}
  .stage-title .dot{width:10px;height:10px;border-radius:50%;background:var(--good);box-shadow:0 0 0 4px var(--good-soft)}
  .stage-title h1{font-size:15px;font-weight:700;letter-spacing:-.2px}
  .stage-title p{font-size:12.5px;color:var(--ink-faint);font-weight:500}

  /* browser frame */
  .browser{width:100%;max-width:1080px;background:var(--browser-bg);border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden;border:1px solid #ffffff80;position:relative}
  .tabstrip{background:var(--chrome-bar);padding:9px 14px 0;display:flex;align-items:flex-end;gap:8px}
  .traffic{display:flex;gap:7px;padding:0 8px 9px 2px}
  .traffic span{width:11px;height:11px;border-radius:50%}
  .traffic .r{background:#ff5f57}.traffic .y{background:#febc2e}.traffic .g{background:#28c840}
  .tab{background:var(--browser-bg);border-radius:9px 9px 0 0;padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px;max-width:215px}
  .tab .fav{width:14px;height:14px;border-radius:4px;background:linear-gradient(135deg,#3a7bff,#7b3aff);flex:none}
  .tab.dim{background:transparent;color:var(--ink-faint);font-weight:500}.tab.dim .fav{background:#c3c7d4}
  .toolbar{background:var(--chrome-bar);padding:8px 14px 11px;display:flex;align-items:center;gap:10px}
  .nav-btns{display:flex;gap:3px;color:var(--ink-soft)}
  .nav-btns button{width:30px;height:30px;border:0;background:transparent;border-radius:50%;cursor:pointer;color:inherit;display:grid;place-items:center}
  .nav-btns button:hover{background:#00000010}
  .omnibox{flex:1;background:var(--omnibox);border-radius:999px;height:36px;display:flex;align-items:center;gap:9px;padding:0 14px;font-size:13px;color:var(--ink);border:1px solid #d8dbe5}
  .omnibox .lock{color:var(--ink-soft);display:flex}
  .omnibox .url{color:var(--ink-soft)} .omnibox .url .host{color:var(--ink)}
  .toolbar .ext{margin-left:auto;display:flex;align-items:center;gap:6px}
  .wallet-pin{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;cursor:pointer;position:relative;transition:.2s;background:transparent;border:0;color:var(--ink-soft)}
  .wallet-pin:hover{background:#00000010} .wallet-pin.alert{color:var(--accent)}
  .wallet-pin .ping{position:absolute;top:3px;right:4px;width:7px;height:7px;border-radius:50%;background:#ea4335;opacity:0;transform:scale(.4)}
  .wallet-pin.alert .ping{opacity:1;transform:scale(1);animation:ping 1.6s infinite}
  @keyframes ping{0%{box-shadow:0 0 0 0 #ea433566}70%{box-shadow:0 0 0 7px #ea433500}100%{box-shadow:0 0 0 0 #ea433500}}
  .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff9a3c,#e0457b);display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px}

  .viewport{position:relative;height:620px;overflow:hidden;background:linear-gradient(180deg,#fbfcff,#f3f5fb)}
  .page{height:100%;overflow:auto;padding:26px 32px 40px}

  /* merchant header + stepper */
  .merch-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .merch-brand{display:flex;align-items:center;gap:11px}
  .merch-logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#0b2a6b,#2f74ff);display:grid;place-items:center;color:#fff}
  .merch-brand h2{font-size:17px;font-weight:800;letter-spacing:-.3px}
  .merch-brand span{font-size:12px;color:var(--ink-faint);font-weight:600}
  .secure-tag{font-size:11.5px;font-weight:700;color:var(--good);background:var(--good-soft);padding:6px 11px;border-radius:999px;display:flex;align-items:center;gap:6px}
  .stepper{display:flex;align-items:center;gap:9px;margin-bottom:22px;flex-wrap:wrap}
  .step{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--ink-faint)}
  .step .n{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:11px;background:#e7e9f1;color:var(--ink-faint)}
  .step.active{color:var(--ink)} .step.active .n{background:var(--accent);color:#fff}
  .step.done{color:var(--good)} .step.done .n{background:var(--good);color:#fff}
  .step .bar{width:24px;height:2px;background:#dfe2ec;border-radius:2px}

  /* generic pieces */
  .plane{width:40px;height:40px;border-radius:11px;background:#eef3ff;color:#2f74ff;display:grid;place-items:center;flex:none}
  .route{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
  .meta{font-size:11.5px;color:var(--ink-faint);font-weight:600;margin-top:3px}
  .tripbar{display:flex;gap:14px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 18px;margin-bottom:18px;max-width:620px}

  .panel{background:var(--card-surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px 22px 24px}
  .panel h3{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-faint);font-weight:800;margin-bottom:16px}
  .auth{display:flex;justify-content:center;padding:6px 0 0}
  .auth-card{width:392px;max-width:100%;background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px 24px}
  .auth-card h2{font-size:19px;font-weight:800;letter-spacing:-.3px}
  .muted{color:var(--ink-faint);font-size:13px;font-weight:600;margin:6px 0 18px}

  /* fields */
  .field{margin-bottom:14px;position:relative}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px}
  .field .control{width:100%;height:46px;border:1.5px solid var(--line);border-radius:12px;background:#fcfcfe;display:flex;align-items:center;padding:0 14px;gap:10px;transition:border-color .2s,box-shadow .2s,background .3s;font-size:14.5px;font-weight:600;color:var(--ink);position:relative;overflow:hidden}
  .field .control.mono{font-family:'JetBrains Mono',monospace;letter-spacing:.5px;font-weight:500}
  .field .control .ph{color:#b9bdca;font-weight:500}
  .field .control .val{opacity:0;transition:opacity .25s}
  .field.filled .control{border-color:#cdd9f2;background:#fff}
  .field.filled .control .val{opacity:1} .field.filled .control .ph{display:none}
  .field .control .net{margin-left:auto;display:flex;align-items:center}
  .field .control .keyhint{margin-left:auto;color:var(--accent);display:none;align-items:center;gap:5px;font-size:11.5px;font-weight:800;background:var(--accent-soft);padding:4px 9px;border-radius:7px}
  .viewport.detected .field.primary .keyhint{display:flex;animation:keypop .35s cubic-bezier(.2,1.3,.4,1)}
  .field.filled .keyhint{display:none!important}
  @keyframes keypop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .field .shimmer{position:absolute;inset:0;border-radius:12px;pointer-events:none;opacity:0;background:linear-gradient(110deg,transparent 20%,#1a73e833 50%,transparent 80%);background-size:220% 100%}
  .field.filling .shimmer{opacity:1;animation:sweep .6s ease}
  @keyframes sweep{from{background-position:140% 0}to{background-position:-140% 0}}

  .cta{margin-top:18px;width:100%;height:50px;border:0;border-radius:13px;background:linear-gradient(135deg,#1a73e8,#0b57d0);color:#fff;font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 10px 22px -10px #1a73e8aa;transition:.2s;letter-spacing:.2px}
  .cta:hover{transform:translateY(-1px);box-shadow:0 14px 26px -10px #1a73e8aa}

  .fill-note{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;font-size:12px;opacity:0;transform:translateY(4px);transition:.3s;max-height:0;overflow:hidden}
  .fill-note.show{opacity:1;transform:none;max-height:80px;margin-top:14px}
  .fill-note .by{display:flex;align-items:center;gap:7px;color:var(--ink-soft);font-weight:700}
  .fill-note .by .gw{width:15px;height:15px;border-radius:50%;background:conic-gradient(#4285f4 0 25%,#ea4335 0 50%,#fbbc05 0 75%,#34a853 0);flex:none}
  .fill-note .clear{background:#fff;border:1.5px solid var(--line);color:var(--ink);font-family:inherit;font-weight:800;font-size:12px;cursor:pointer;padding:7px 12px;border-radius:9px;display:flex;align-items:center;gap:6px;transition:.15s;flex:none}
  .fill-note .clear:hover{border-color:#c2c7d6;background:#f6f7fb}

  /* payment summary */
  .checkout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;max-width:900px}
  @media(max-width:820px){.checkout{grid-template-columns:1fr}}
  .summary .line{display:flex;justify-content:space-between;font-size:13.5px;font-weight:600;padding:9px 0;border-bottom:1px dashed var(--line);color:var(--ink-soft)}
  .summary .line .v{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
  .summary .flight{display:flex;gap:13px;align-items:center;margin-bottom:14px;padding-bottom:16px;border-bottom:1px solid var(--line)}
  .summary .total{display:flex;justify-content:space-between;align-items:baseline;margin-top:14px}
  .summary .total .lbl{font-weight:800;font-size:14px}
  .summary .total .amt{font-weight:800;font-size:24px;letter-spacing:-.5px;font-variant-numeric:tabular-nums}

  /* confirmation */
  .conf{max-width:560px;margin:8px auto 0;background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px 26px 24px}
  .conf-head{display:flex;align-items:center;gap:14px;margin-bottom:20px}
  .conf-head .big{width:50px;height:50px;border-radius:50%;background:var(--good-soft);color:var(--good);display:grid;place-items:center;flex:none}
  .conf-head h2{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .conf-head .ref{font-family:'JetBrains Mono';font-weight:700;color:var(--ink-soft);font-size:12.5px;margin-top:3px}
  .conf-card{border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .conf-sec{padding:15px 18px;border-bottom:1px solid var(--line)}
  .conf-sec:last-child{border-bottom:0}
  .conf-label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);font-weight:800;margin-bottom:12px}
  .leg{display:flex;gap:12px;align-items:center;margin-bottom:13px}
  .leg:last-child{margin-bottom:0}
  .leg-ic{width:36px;height:36px;border-radius:10px;background:#eef3ff;color:#2f74ff;display:grid;place-items:center;flex:none}
  .leg-route{font-weight:800;font-size:14px}
  .leg-meta{font-size:11.5px;color:var(--ink-faint);font-weight:600;margin-top:2px}
  .pax{display:flex;flex-wrap:wrap;gap:8px}
  .pax span{font-size:12.5px;font-weight:700;background:#f1f3f9;border:1px solid var(--line);padding:6px 11px;border-radius:8px;display:flex;align-items:center;gap:7px}
  .pax span b{width:20px;height:20px;border-radius:50%;color:#fff;display:grid;place-items:center;font-size:10px;font-weight:800}
  .payrow{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:800}
  .payrow .payl{display:flex;align-items:center;gap:9px;color:var(--ink)}
  .payrow .payr{font-variant-numeric:tabular-nums}
  .pmini{width:30px;height:20px;border-radius:4px;flex:none;box-shadow:inset 0 0 0 1px #ffffff22}
  .rewardrow{margin-top:11px;font-size:12px;font-weight:700;color:var(--good);display:flex;align-items:center;gap:7px}
  .conf-foot{text-align:center;font-size:12px;color:var(--ink-faint);font-weight:600;margin:18px 0 2px}
  .conf .cta{max-width:280px;margin:14px auto 0}

  /* wallet panel */
  .wallet{position:absolute;top:14px;right:14px;width:340px;z-index:40;background:var(--w-bg);color:var(--w-ink);border-radius:22px;
    box-shadow:0 30px 70px -20px rgba(15,18,40,.5),0 0 0 1px var(--w-line);padding:16px 16px 14px;transform-origin:top right;
    opacity:0;transform:translateY(-12px) scale(.94);pointer-events:none;transition:opacity .35s,transform .45s cubic-bezier(.18,1.1,.3,1)}
  .wallet.open{opacity:1;transform:none;pointer-events:auto}
  .wallet-head{display:flex;align-items:center;gap:10px;padding:2px 4px 12px;border-bottom:1px solid var(--w-line)}
  .wallet-head .mark{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none;background:transparent;overflow:hidden}
  .wallet-head .titles{flex:1}
  .wallet-head .titles .b{font-weight:800;font-size:14px;letter-spacing:-.2px}
  .wallet-head .titles .s{font-size:11px;color:var(--w-sub);font-weight:600}
  .wallet-head .x{border:0;background:transparent;color:var(--w-sub);cursor:pointer;width:26px;height:26px;border-radius:50%;display:grid;place-items:center}
  .wallet-head .x:hover{background:#80808022}
  .wallet-body{padding-top:4px}
  .reco-banner{margin:12px 2px 8px;padding:11px 12px;border-radius:13px;display:flex;gap:10px;align-items:flex-start;background:var(--good-soft);border:1px solid #bfe3c8}
  .reco-banner.info{background:var(--accent-soft);border-color:#cadcff}
  .reco-banner .ic{color:var(--good);flex:none;margin-top:1px} .reco-banner.info .ic{color:var(--accent)}
  .reco-banner .tx{font-size:12px;line-height:1.45;font-weight:600} .reco-banner .tx b{font-weight:800}
  .wallet-list{display:flex;flex-direction:column;gap:9px;margin-top:6px;max-height:300px;overflow:auto;padding:10px 2px 2px}
  .wallet-list::-webkit-scrollbar{width:6px}.wallet-list::-webkit-scrollbar-thumb{background:#bbb6;border-radius:9px}
  .wallet-foot{font-size:10.5px;color:var(--w-sub);text-align:center;padding:11px 4px 2px;font-weight:600;border-top:1px solid var(--w-line);margin-top:10px;line-height:1.4}

  /* saved-credential / profile item */
  .witem{display:flex;align-items:center;gap:12px;padding:11px;border-radius:14px;border:1.5px solid var(--w-line);cursor:pointer;width:100%;font-family:inherit;text-align:left;background:transparent;transition:.18s;position:relative;margin-top:8px}
  .witem:hover{border-color:#9bb6ec;transform:translateY(-1px)}
  .witem .av{width:40px;height:40px;border-radius:11px;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px}
  .witem .info{flex:1;min-width:0;display:flex;flex-direction:column}
  .witem .info .nm{font-weight:800;font-size:13.5px;color:var(--w-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .witem .info .sub{font-size:11px;color:var(--w-sub);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .witem .use{font-size:11px;font-weight:800;color:var(--w-accent);flex:none;background:var(--accent-soft);padding:7px 11px;border-radius:9px}
  .idchips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .idchips span{font-size:10px;font-weight:700;color:var(--w-sub);background:#0000000a;border:1px solid var(--w-line);padding:3px 7px;border-radius:6px}

  /* card rows */
  .wcard{display:flex;flex-direction:column;gap:9px;padding:11px 12px;border-radius:14px;cursor:pointer;border:1.5px solid var(--w-line);background:transparent;text-align:left;width:100%;font-family:inherit;transition:.18s;position:relative}
  .wcard .wcrow{display:flex;align-items:center;gap:11px}
  .wcard .cname{font-weight:800;font-size:13.5px;color:var(--w-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wcard .wbenefit{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 10px;border-radius:9px;background:#00000008}
  .wcard.best .wbenefit{background:#1a73e814}
  .wcard.active .wbenefit{background:#18803814}
  .wcard .bsub{font-size:11px;font-weight:700;color:var(--w-sub)}
  .wcard .bval{font-size:12px;font-weight:800;color:var(--good);white-space:nowrap}
  .wcard .bval i{font-style:normal;font-weight:600;color:var(--w-sub);font-size:10.5px}
  .wcard:hover{border-color:#9bb6ec;transform:translateY(-1px)}
  .wcard.best{border-color:#1a73e8;background:#1a73e80a}
  .wcard.active{border-color:#188038;background:#e6f4ea}
  .wcard .mini{width:54px;height:35px;border-radius:7px;flex:none;position:relative;overflow:hidden;box-shadow:inset 0 0 0 1px #ffffff22}
  .wcard .mini .chip{position:absolute;top:6px;left:6px;width:9px;height:7px;border-radius:2px;background:#ffd76a;opacity:.9}
  .wcard .mini .l4{position:absolute;bottom:4px;left:6px;font-size:6.5px;font-family:'JetBrains Mono';color:#fff;opacity:.9;letter-spacing:.5px}
  .wcard .cinfo{flex:1;min-width:0}
  .wcard .cinfo .nm{font-weight:800;font-size:13px;color:var(--w-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wcard .cinfo .sub{font-size:11px;color:var(--w-sub);font-weight:600;margin-top:1px}
  .wcard .reward{text-align:right;flex:none}
  .wcard .reward .amt{font-weight:800;font-size:13px;color:var(--good);font-variant-numeric:tabular-nums}
  .wcard .reward .lbl{font-size:9.5px;color:var(--w-sub);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .wcard .badge{position:absolute;top:-8px;left:12px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:#1a73e8;color:#fff;padding:2px 7px;border-radius:999px}
  .wcard .active-tag{position:absolute;top:-8px;right:12px;display:none;align-items:center;gap:4px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:#188038;color:#fff;padding:2px 7px;border-radius:999px}
  .wcard.active .active-tag{display:flex}
  .wcard .selecting{position:absolute;inset:0;border-radius:14px;background:#1a73e8;color:#fff;display:none;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:13px}
  .wcard.go .selecting{display:flex}

  /* network marks */
  .net-mark{display:flex;align-items:center}
  .net-mark i{width:15px;height:15px;border-radius:50%;display:block;margin-left:-5px}.net-mark i:first-child{margin-left:0}
  .net-mark .red{background:#eb001b}.net-mark .yel{background:#f79e1b;mix-blend-mode:multiply}
  .net-mark.visa{font-family:'Manrope';font-style:italic;font-weight:800;font-size:13px;color:#fff;letter-spacing:.5px}
  .net-mark.amex{font-family:'Manrope';font-weight:800;font-size:9px;color:#fff;letter-spacing:1px;background:#2671c4;padding:3px 5px;border-radius:4px;line-height:1}

  /* flying token */
  #flyer{position:fixed;z-index:90;width:210px;height:132px;border-radius:14px;color:#fff;opacity:0;pointer-events:none;
    box-shadow:0 26px 50px -12px rgba(10,14,40,.55);overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;
    padding:14px 16px;transform:translate(-50%,-50%) scale(.5)}
  #flyer .gloss{position:absolute;inset:0;background:linear-gradient(120deg,#fff0 35%,#ffffff44 50%,#fff0 65%);pointer-events:none}
  #flyer .fl-top{font-size:11px;font-weight:800;letter-spacing:.3px;opacity:.92;display:flex;align-items:center;gap:6px;position:relative}
  #flyer .fl-main{font-size:17px;font-weight:800;letter-spacing:-.2px;position:relative}
  #flyer .fl-sub{font-size:10.5px;font-weight:600;opacity:.85;position:relative}

<body>

<script>
/* ---------------- DATA ---------------- */
const PURCHASE = { amount: 842.00, merchant: "Skyward Air" };
const PROFILES = [
  {id:"yifan", firstName:"Yifan", lastName:"Zou", holder:"YIFAN ZOU", email:"yifan.zou@gmail.com",
   dob:"12 / 04 / 1994", gender:"Female", ff:"SK 4827 1190", phone:"(650) 555-0142", zip:"94086",
   av:"linear-gradient(135deg,#ff9a3c,#e0457b)", initial:"Y"},
  {id:"john", firstName:"John", lastName:"Doe", holder:"JOHN DOE", email:"john.doe@gmail.com",

   av:"linear-gradient(135deg,#2f9bff,#1cc7b0)", initial:"J"}
];
const ACCOUNT = PROFILES[0];   // signed-in account owner (sign-in + card holder)

/* Real cards + published earning rates for FLIGHTS BOOKED DIRECTLY WITH THE AIRLINE (May 2026).
   cpp = assumed cash value per point/mile to compare currencies (~2.0c Amex MR & Chase UR; ~1.85c Capital One). */
const CARDS = [
  {id:"amexplat",name:"Amex Platinum",issuer:"American Express",net:"amex",ink:"#23272e",grad:"linear-gradient(135deg,#eef1f4,#b9c0ca 42%,#f6f8fa 68%,#cdd3db)",last4:"0005",number:"3782 822463 10005",exp:"08 / 29",cvc:"3492",multiplier:5,cpp:0.02,reasonCat:"direct flights"},
  {id:"csr",name:"Chase Sapphire Reserve",issuer:"Chase",net:"visa",grad:"linear-gradient(135deg,#3157b4,#11244a 55%,#1d3b80)",last4:"3091",number:"4147 2025 1188 3091",exp:"03 / 28",cvc:"318",multiplier:4,cpp:0.02,reasonCat:"direct flights"},
  {id:"amexgold",name:"Amex Gold",issuer:"American Express",net:"amex",ink:"#4a3a08",grad:"linear-gradient(135deg,#f0d486,#caa23f 44%,#f7e6a6 70%,#d3ac46)",last4:"8431",number:"3714 496353 98431",exp:"11 / 27",cvc:"8021",multiplier:3,cpp:0.02,reasonCat:"direct flights"},
  {id:"venturex",name:"Capital One Venture X",issuer:"Capital One",net:"visa",grad:"linear-gradient(135deg,#3d3a34,#141210 55%,#4b463e)",last4:"2048",number:"4801 1190 7762 2048",exp:"05 / 30",cvc:"905",multiplier:2,cpp:0.0185,reasonCat:"all purchases",unit:"mi"},
  {id:"doublecash",name:"Citi Double Cash",issuer:"Citi",net:"mc",grad:"linear-gradient(135deg,#28486b,#0f2236 60%,#2e4d6e)",last4:"5106",number:"5412 7510 3320 5106",exp:"09 / 28",cvc:"441",multiplier:0.02,cpp:1,reasonCat:"all purchases",flat:true}
];
const rewardValue = c => c.flat ? PURCHASE.amount*c.multiplier : PURCHASE.amount*c.multiplier*c.cpp;
const rewardUnits = c => c.flat ? null : Math.round(PURCHASE.amount*c.multiplier);
CARDS.forEach(c=>c.value=rewardValue(c));
const RANKED=[...CARDS].sort((a,b)=>b.value-a.value);
const BEST=RANKED[0];
const money=v=>"$"+v.toFixed(2);
const titlecase=s=>s.toLowerCase().replace(/\b\w/g,m=>m.toUpperCase());

function netHTML(net){
  if(net==="visa") return '<span class="net-mark visa">VISA</span>';
  if(net==="amex") return '<span class="net-mark amex">AMEX</span>';

}

/* ---------------- ICONS ---------------- */
const ICO={
  key:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M21 2l-9.5 9.5M15 8l3 3M11.5 11.5a4.5 4.5 0 1 0-3 3 4.5 4.5 0 0 0 3-3z"/></svg>',
  walletW:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1"><rect x="2.5" y="5" width="19" height="14" rx="3"/><path d="M2.5 9.5h19M16 14h2.5"/></svg>',

  person:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>',
  shield:'<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1l9 4v6c0 5.5-3.8 10.7-9 12-5.2-1.3-9-6.5-9-12V5l9-4z"/></svg>',
  idcard:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="11" r="2"/><path d="M13 9h5M13 13h5M5.5 16a3 3 0 0 1 6 0"/></svg>',
  star:'<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6 4.4 2.3 7.2L12 16.6 5.7 21l2.3-7.2-6-4.4h7.6z"/></svg>',

  plane:'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2 16l8.5-2.3L14 21l1.6-.5-1.4-7.6 5.8-1.6c.9-.25 1.4-1 1.2-1.7-.2-.7-1-1.1-1.9-.85l-5.8 1.6L8.4 4.7 6.8 5.2l3 6.4L2 13.7V16z"/></svg>',
  lock:'<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1l9 4v6c0 5.5-3.8 10.7-9 12-5.2-1.3-9-6.5-9-12V5l9-4z"/></svg>',

  check:'<svg class="ok" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2l-3.5-3.5L4 14.2 9 19l11-11-1.4-1.4z"/></svg>',

/* ---------------- DOM + TIMERS ---------------- */
const $=s=>document.querySelector(s);
const viewport=$("#viewport"), wallet=$("#wallet"), walletBody=$("#walletBody"),
      walletSub=$("#walletSub"), flyer=$("#flyer"), toast=$("#toast"),
      walletPin=$("#walletPin"), ctrlHint=$("#ctrlHint"), page=$("#page");
let timers=[], autoTimer=null, lastCard=BEST;
const after=(ms,fn)=>{const t=setTimeout(fn,ms);timers.push(t);return t;};
const clearTimers=()=>{timers.forEach(clearTimeout);timers=[];};
const cancelAuto=()=>{if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}};
const showToast=h=>{toast.innerHTML=h;toast.classList.add("show");};
const hideToast=()=>toast.classList.remove("show");

/* ---------------- TEMPLATES ---------------- */
function field(key,label,ph,o={}){
  const cls=["field","f-"+key]; if(o.primary)cls.push("primary");
  return `<div class="${cls.join(' ')}">
    <label>${label}</label>
    <div class="control ${o.mono?'mono':''}">
      <span class="ph">${ph}</span><span class="val" data-field="${key}"></span>
      ${key==='number'?'<span class="net" data-field="net"></span>':''}
      ${o.primary?`<span class="keyhint">${ICO.key} Wallet</span>`:''}
      <span class="shimmer"></span>
    </div></div>`;
}

function header(){return `<div class="merch-head">
  <div class="merch-brand"><div class="merch-logo">${ICO.plane}</div>
  <div><h2>Skyward Air</h2><span>Book · Manage · Fly</span></div></div>
  <div class="secure-tag">${ICO.shield} Secure</div></div>`;}
function stepper(active){
  const labels=["Sign in","Passenger","Payment"];let h='<div class="stepper">';
  labels.forEach((l,i)=>{const n=i+1;let cls="step",mk=n;if(n<active){cls+=" done";mk="✓";}else if(n===active)cls+=" active";
    if(i)h+='<span class="bar"></span>';h+=`<span class="${cls}"><span class="n">${mk}</span>${l}</span>`;});
  return h+'</div>';
}
const shell=(step,inner)=>header()+stepper(step)+inner;
const tripbar=()=>`<div class="tripbar"><div class="plane">${ICO.plane}</div>
  <div><div class="route">SFO ${ICO.arrowS} NRT</div><div class="meta">Round trip · Premium economy · 2 travelers · $842.00</div></div></div>`;
const summary=()=>`<div class="panel summary"><h3>Your trip</h3>
  <div class="flight"><div class="plane">${ICO.plane}</div>
  <div><div class="route">SFO ${ICO.arrowS} NRT</div><div class="meta">Round trip · Premium economy · 2 travelers</div></div></div>

const PAGE={
  signin:()=>shell(1,`<div class="auth"><div class="auth-card">

  passenger:()=>shell(2,`${tripbar()}

    <div class="panel" style="max-width:640px;margin-bottom:16px"><h3>Passenger 2 · Adult</h3>
    <div class="row2">${field('p2_firstName','First name','First name')}${field('p2_lastName','Last name','Last name')}</div>
    <div class="row2">${field('p2_dob','Date of birth','MM / DD / YYYY',{mono:true})}${field('p2_gender','Gender','Select')}</div>
    ${field('p2_ff','SkyMiles frequent flyer #','Optional',{mono:true})}</div>
    <div class="panel" style="max-width:640px"><h3>Contact details</h3>

  payment:()=>shell(3,`<div class="checkout">

          <span><b style="background:${PROFILES[1].av}">${PROFILES[1].initial}</b>${PROFILES[1].firstName} ${PROFILES[1].lastName}</span>

    <div class="conf-foot">A confirmation email was sent to ${ACCOUNT.email}</div>
    <button class="cta" id="startover">Replay the journey</button></div>`)
};

/* ---------------- WALLET CONTENT ---------------- */
const SUB={signin:"Saved password for this site",passenger:"Saved travelers for this trip",payment:"Choose a card for this purchase"};
/* ── WALLET LOGO — single swap point for all three dialog headers ──────────────
   Replace the value below with the official Google Wallet logo asset, e.g.
     const WALLET_LOGO = '<svg ...official mark...></svg>';
     const WALLET_LOGO = '<img src="https://.../google-wallet.svg" width="18" height="18">';

const WALLET_LOGO = '<img src="'+WALLET_IMG+'" alt="Google Wallet" style="width:26px;height:26px;border-radius:7px;display:block">';
{ const pi=document.querySelector("#walletPin .pin-ico"); if(pi) pi.innerHTML='<img src="'+WALLET_IMG+'" alt="" style="width:20px;height:20px;border-radius:5px;display:block">'; }
const BRAND={signin:{name:"Google Wallet",glyph:WALLET_LOGO},passenger:{name:"Google Wallet",glyph:WALLET_LOGO},payment:{name:"Google Wallet",glyph:WALLET_LOGO}};

const actionsHTML=()=>`<div class="wallet-actions" id="walletActions"><button class="wclear" id="walletClear">${ICO.trash} Clear filled form</button></div>`;
function walletHTML(screen){
  if(screen==='signin') return `
    <div class="reco-banner info"><span class="ic">${ICO.shield}</span>
    <div class="tx">Saved sign-in for <b>skywardair.com</b>. Tap to fill your email &amp; password.</div></div>
    <button class="witem"><span class="av" style="background:linear-gradient(135deg,#3a7bff,#7b3aff)">${ICO.keyW}</span>
      <span class="info"><span class="nm">yifan.zou@gmail.com</span><span class="sub">skywardair.com</span></span>
      <span class="use" data-use="Fill">Fill</span></button>
    ${actionsHTML()}<div class="wallet-foot">Saved securely in Google Wallet.</div>`;

  if(screen==='passenger'){
    let items='';
    PROFILES.forEach((p,i)=>{ items+=`<button class="witem" data-id="${p.id}">
      <span class="av" style="background:${p.av}">${p.initial}</span>
      <span class="info"><span class="nm">${p.firstName} ${p.lastName}</span>
      <div class="idchips"><span>DOB ${p.dob.replace(/ /g,'')}</span><span>${p.gender}</span><span>SkyMiles ${p.ff}</span></div></span>
      <span class="use" data-use="Passenger ${i+1}">Passenger ${i+1}</span></button>`; });
    return `<div class="reco-banner info"><span class="ic">${ICO.idcard}</span>
      <div class="tx">Choose a saved <b>traveler</b> to autofill — name, DOB, gender, SkyMiles &amp; contact.</div></div>
      ${items}
      ${actionsHTML()}<div class="wallet-foot">Saved in Google Wallet. You control what's shared.</div>`;
  }

  // payment
  const r=rewardUnits(BEST);
  let list='<div class="wallet-list">';
  RANKED.forEach(c=>{
    const best=c.id===BEST.id;
    const sub=c.flat?`${(c.multiplier*100).toFixed(0)}% cash back · ${c.reasonCat}`:`${c.multiplier}× points · ${c.reasonCat}`;
    const rl=c.flat?"cash back":`${rewardUnits(c).toLocaleString()} ${c.unit||'pts'}`;
    list+=`<button class="wcard${best?' best':''}" data-id="${c.id}">
      ${best?'<span class="badge">Best value</span>':''}
      <span class="active-tag">${ICO.check} Filled</span>
      <div class="wcrow">
        <span class="mini" style="background:${c.grad}"><span class="chip"></span><span class="l4" style="color:${c.ink||'#fff'}">•• ${c.last4}</span></span>
        <span class="cname">${c.name}</span>
      </div>
      <div class="wbenefit"><span class="bsub">${sub}</span><span class="bval">+${money(c.value)} <i>· ${rl}</i></span></div>
      <span class="selecting">${ICO.check} Filling…</span></button>`;
  });
  list+='</div>';
  return `<div class="reco-banner"><span class="ic">${ICO.star}</span>
    <div class="tx">For this <b>$842 flight booked directly with ${PURCHASE.merchant}</b>, your <b>${BEST.name}</b> earns <b>${BEST.multiplier}× = ${r.toLocaleString()} points</b> (≈ <b>${money(BEST.value)}</b>) — the most of your ${CARDS.length} cards. Auto-selected.</div></div>
    ${list}
    ${actionsHTML()}<div class="wallet-foot">Values are estimates (~2¢/point; Capital One ~1.85¢); redemption value varies. Rates reflect each card's published rate for flights booked directly, as of May 2026.</div>`;
}

function renderWallet(screen){
  const B=BRAND[screen]; if(B){const wb=$("#walletBrand"); if(wb)wb.textContent=B.name; const wm=$("#walletMark"); if(wm)wm.innerHTML=B.glyph;}
  walletSub.textContent=SUB[screen]||"";
  walletBody.innerHTML=walletHTML(screen);
  if(screen==='signin') walletBody.querySelector('.witem').onclick=doSignin;
  else if(screen==='passenger') walletBody.querySelectorAll('.witem').forEach((w,i)=>w.onclick=()=>chooseProfile(w.dataset.id,i+1));
  else if(screen==='payment') walletBody.querySelectorAll('.wcard').forEach(w=>w.onclick=()=>chooseCard(w.dataset.id));
  const wc=walletBody.querySelector('#walletClear'); if(wc) wc.onclick=clearForm;
}

/* ---------------- FLOW ---------------- */
const NEXT={signin:'passenger',passenger:'payment',payment:'done'};
const DETECT={signin:'Sign-in form detected',passenger:'We can fill your traveler details',payment:'Card form detected on this page'};
const HINT_FILL={signin:'Filling your saved sign-in…',passenger:'Filling your saved traveler profile…',payment:'Auto-selecting your best-rewards card…'};
const HINT_PICK={signin:'Click your saved login to fill the form.',passenger:'Click your profile to fill the form.',payment:'Pick any card to fill the form.'};
const HINT_DONE={signin:'Sign-in filled — click “Sign in”.',passenger:'Details filled — click “Continue to payment”.',payment:'Filled. Tap another card to switch, or Clear form.'};
let current='signin';

function goTo(s){ if(s==='signin') lastCard=BEST; current=s; renderScreen(); }
function resetFlyer(){flyer.style.opacity=0;flyer.style.filter='none';}

function renderScreen(){
  clearTimers();cancelAuto();resetFlyer();hideToast();
  wallet.classList.remove("open");viewport.classList.remove("detected");walletPin.classList.remove("alert");
  $("#urlPath").textContent={signin:'/signin',passenger:'/book/passenger',payment:'/book/payment',done:'/book/confirmed'}[current];
  page.innerHTML=PAGE[current]();
  // wire buttons
  const cta=$("#cta"); if(cta) cta.onclick=()=>goTo(NEXT[current]);
  const so=$("#startover"); if(so) so.onclick=()=>goTo('signin');

  if(current==='done'){ ctrlHint.textContent='Journey complete — wallet filled every step. Replay to watch again.'; return; }

  renderWallet(current);
  after(650,()=>{viewport.classList.add("detected");walletPin.classList.add("alert");showToast(`${ICO.check} ${DETECT[current]}`);});
  after(1650,()=>{hideToast();openWallet(true);});
}

function openWallet(autoArm){
  renderWallet(current); // ensure fresh
  wallet.classList.add("open");cancelAuto();
  if(autoArm){ctrlHint.textContent=HINT_FILL[current];autoTimer=setTimeout(()=>{autoTimer=null;autoFill();},1450);timers.push(autoTimer);}
  else ctrlHint.textContent=HINT_PICK[current];
}
function closeWallet(){cancelAuto();wallet.classList.remove("open");}
function autoFill(){ if(current==='signin')doSignin(); else if(current==='passenger')doPassenger(); else if(current==='payment')doPaymentBest(); }

/* dress + fly the token, then fill */
function runFly(sourceEl,targetSel,bg,html,onArrive,ink){
  const s=sourceEl.getBoundingClientRect();
  const tEl=document.querySelector(targetSel); if(!tEl){onArrive();return;}
  const t=tEl.getBoundingClientRect();
  const endX=t.left+Math.min(150,t.width*0.42), endY=t.top+t.height/2+78;
  flyer.style.background=bg; flyer.style.color=ink||"#fff";
  flyer.innerHTML='<div class="gloss"></div>'+html;
  flyer.style.transition="none";
  flyer.style.left=(s.left+s.width/2)+"px"; flyer.style.top=(s.top+s.height/2)+"px";
  flyer.style.transform="translate(-50%,-50%) scale(.42) rotate(-8deg)";
  flyer.style.opacity=1; flyer.style.filter="none";
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    flyer.style.transition="left 1.0s cubic-bezier(.5,.02,.2,1),top 1.0s cubic-bezier(.5,.02,.2,1),transform 1.0s cubic-bezier(.5,.02,.2,1),opacity .35s,filter .5s";
    flyer.style.left=endX+"px"; flyer.style.top=endY+"px";
    flyer.style.transform="translate(-50%,-50%) scale(1) rotate(0deg)";
  }));
  after(1010,()=>{flyer.style.transform="translate(-50%,-50%) scale(1.06)";flyer.style.opacity=0;flyer.style.filter="blur(2px)";onArrive();});
}

/* token faces */
const credHTML=()=>`<div class="fl-top">${ICO.keyW} Saved password</div><div class="fl-main">yifan.zou@gmail.com</div><div class="fl-sub">skywardair.com · ••••••••</div>`;
const idHTML=p=>`<div class="fl-idhead"><span class="fl-ava">${p.initial}</span><span class="fl-idmeta"><span class="fl-idname">${p.firstName} ${p.lastName}</span><span class="fl-idrole">${ICO.person} Saved traveler profile</span></span></div><div class="fl-idchips"><span>DOB ${p.dob.replace(/ /g,"")}</span><span>${p.gender}</span><span>SkyMiles</span></div>`;
const cardHTML=c=>`<div class="fl-top">${c.issuer}</div><div class="fl-chip2"></div><div class="fl-num">${c.number}</div><div class="fl-foot"><span>${ACCOUNT.holder}</span><span>${netHTML(c.net)}</span></div>`;
const CRED_BG='linear-gradient(135deg,#2b3242,#161b26 60%,#343c4e)';
const ID_BG='linear-gradient(135deg,#3b3d8f,#1f2150 60%,#4a4da8)';

/* per-screen autofill */
function doSignin(){
  cancelAuto();
  const src=walletBody.querySelector('.witem'); if(!src)return;
  resetFields();
  runFly(src,'.f-password',CRED_BG,credHTML(),()=>fillForm([
    {key:'email',val:ACCOUNT.email},{key:'password',val:'••••••••••'}],'your saved sign-in'));
}
function doPassenger(){ fillAllPassengers(); }                       // auto: fill BOTH travelers
function fillAllPassengers(){
  cancelAuto(); resetFields();
  fillPassengerSlot(PROFILES[0],1);
  after(2350,()=>fillPassengerSlot(PROFILES[1],2));
}
function chooseProfile(id,slot){ clearTimers(); cancelAuto(); fillPassengerSlot(PROFILES.find(p=>p.id===id),slot); }
function fillPassengerSlot(p,slot){
  if(!p)return;
  const src=walletBody.querySelector('.witem[data-id="'+p.id+'"]')||walletBody.querySelector('.witem'); if(!src)return;
  const tgt='.f-p'+slot+'_firstName';
  const tEl=document.querySelector(tgt); if(tEl) tEl.scrollIntoView({block:'center'});
  requestAnimationFrame(()=>{
    const seq=[
      {key:'p'+slot+'_firstName',val:p.firstName},{key:'p'+slot+'_lastName',val:p.lastName},
      {key:'p'+slot+'_dob',val:p.dob},{key:'p'+slot+'_gender',val:p.gender},{key:'p'+slot+'_ff',val:p.ff}];
    if(slot===1) seq.push({key:'email',val:ACCOUNT.email},{key:'phone',val:ACCOUNT.phone});
    runFly(src,tgt,ID_BG,idHTML(p),()=>fillForm(seq,'Passenger '+slot+' · '+p.firstName+' '+p.lastName,null,p.id));
  });
}
function doPaymentBest(){ fillWithCard(BEST); }
function chooseCard(id){ cancelAuto(); fillWithCard(CARDS.find(c=>c.id===id)); }
function fillWithCard(card){
  lastCard=card;
  const node=walletBody.querySelector('.wcard[data-id="'+card.id+'"]'); if(!node)return;
  resetFields();
  document.querySelectorAll('.wcard').forEach(w=>w.classList.remove('go','active'));
  node.classList.add('go');
  runFly(node.querySelector('.mini'),'.f-number',card.grad,cardHTML(card),()=>fillForm([
    {key:'name',val:titlecase(ACCOUNT.holder)},{key:'number',val:card.number,net:card.net},
    {key:'exp',val:card.exp},{key:'cvc',val:card.cvc},{key:'zip',val:ACCOUNT.zip}],card.name+' (+'+money(card.value)+')',card.id),card.ink||'#fff');
}

/* generic cascade fill */
function resetFields(){
  document.querySelectorAll('.field').forEach(f=>f.classList.remove('filled','filling'));
  document.querySelectorAll('.val').forEach(v=>v.textContent='');
  const n=document.querySelector('.f-number .net'); if(n)n.innerHTML='';
  const wa=$("#walletActions"); if(wa)wa.classList.remove('show');
  walletBody.querySelectorAll('.witem').forEach(w=>{w.classList.remove('active'); const u=w.querySelector('.use'); if(u)u.textContent=(u.dataset.use||'Fill');});
}
function fillForm(seq,summary,cardId,itemId){
  seq.forEach((st,i)=>after(i*130,()=>{
    const f=document.querySelector('.f-'+st.key); if(!f)return;
    f.classList.add('filling');
    const v=f.querySelector('.val[data-field="'+st.key+'"]'); if(v)v.textContent=st.val;
    if(st.net){const ns=document.querySelector('.f-number .net'); if(ns)ns.innerHTML=netHTML(st.net);}
    after(120,()=>f.classList.add('filled'));
    after(600,()=>f.classList.remove('filling'));
  }));
  after(seq.length*130+260,()=>{
    const wa=$("#walletActions"); if(wa)wa.classList.add('show');
    if(cardId){
      document.querySelectorAll('.wcard').forEach(w=>w.classList.remove('go'));
      const an=walletBody.querySelector('.wcard[data-id="'+cardId+'"]'); if(an)an.classList.add('active');
      const card=CARDS.find(c=>c.id===cardId), isBest=cardId===BEST.id;
      showToast(isBest?`${ICO.check} ${card.name} · best rewards (+${money(card.value)})`
        :`${ICO.star} ${card.name} (+${money(card.value)}). Best would earn +${money(BEST.value)}.`);
      after(3200,hideToast);
    } else {
      const wi=itemId?walletBody.querySelector('.witem[data-id="'+itemId+'"]'):walletBody.querySelector('.witem'); if(wi){wi.classList.add('active'); const u=wi.querySelector('.use'); if(u)u.textContent='Filled';}
      showToast(`${ICO.check} Filled ${summary}`); after(2400,hideToast);
    }
    ctrlHint.textContent=HINT_DONE[current];
  });
}

function clearForm(){
  clearTimers();cancelAuto();resetFields();
  document.querySelectorAll('.wcard').forEach(w=>w.classList.remove('go','active'));
  if(!wallet.classList.contains("open")) openWallet(false); else ctrlHint.textContent=HINT_PICK[current];
  ctrlHint.textContent="Form cleared — use the wallet to fill it again.";
}

/* persistent controls */
$("#replayBtn").addEventListener("click",()=>goTo('signin'));
$("#walletPin").addEventListener("click",()=> current==='done'?null:(wallet.classList.contains("open")?closeWallet():openWallet(false)));
$("#walletClose").addEventListener("click",closeWallet);
window.addEventListener("resize",()=>{if(flyer.style.opacity==="1")flyer.style.opacity=0;});

/* ---------------- START ---------------- */
renderScreen();
</script>
</body>
</html>
